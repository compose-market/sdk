        inputs:
            - location: ./specs/inference.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/compose-market/compose-market/inference
    manowar:
        inputs:
            - location: ./specs/manowar.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/compose-market/compose-market/manowar
    memory:
        inputs:
            - location: ./specs/memory.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/compose-market/compose-market/memory
    x402:
