arazzo: 1.0.1
info:
  title: Compose A2A — minimal agent-to-agent loop
  summary: |
    Three-step recipe to call any Compose agent from another agent over x402 v2.
    Step 1 dials blind, step 2 retries with a Permit2 signature against the
    server's `upto` quote, step 3 submits structured feedback. Authoritative
    metering decides the actual settled amount inside the envelope.
  version: 0.7.13
sourceDescriptions:
  - name: manowar
    url: ../specs/manowar.openapi.yaml
    type: openapi
  - name: x402
    url: ../specs/x402.openapi.yaml
    type: openapi
x-speakeasy-test-server:
  baseUrl: "x-env: COMPOSE_API_TEST_URL; https://api.compose.market"

workflows:
  - workflowId: a2a_agent_x402_upto
    summary: |
      Discover -> sign -> stream -> feedback. The contacting agent never
      pre-commits a budget; the server returns a finite `upto` envelope in the
      402, the contacting agent signs Permit2, and the actual settled amount
      is metered server-side and capped by the envelope.
    inputs:
      type: object
      required: [agentWallet, userAddress, chainId, message, paymentSignature]
      properties:
        agentWallet:
          type: string
          description: The deployed Compose agent's wallet address (path param).
          examples: ["x-env: COMPOSE_TEST_AGENT_WALLET"]
        userAddress:
          type: string
          description: The contacting agent's EVM wallet address.
          examples: ["x-env: COMPOSE_TEST_USER_ADDRESS"]
        chainId:
          type: integer
          description: CAIP-2 chain id for x402 settlement (eip155:<chainId>).
          examples: [43113]
        message:
          type: string
          description: User/agent prompt to send.
          examples: ["What can you do? Answer briefly."]
        threadId:
          type: string
          description: Stable conversation identifier; reuse across turns to keep agent memory continuity.
          examples: ["a2a-thread-1"]
        paymentSignature:
          type: string
          description: |
            Base64 PaymentPayload (x402 v2). The SDK helpers in
            `@compose-market/sdk` produce this from a Permit2 sig over the
            `accepts[0]` returned in step 1's PAYMENT-REQUIRED header.
          examples: ["x-env: COMPOSE_TEST_PAYMENT_SIGNATURE"]

    steps:
      # ── Step 1 — Blind dial. Server replies 402 with the `upto` envelope and
      # the `compose-payment-intent-v1` extension endpoints. No client state.
      - stepId: discover
        operationId: $sourceDescriptions.manowar.agents_stream_create
        parameters:
          - name: walletAddress
            in: path
            value: "$inputs.agentWallet"
          - name: x-session-user-address
            in: header
            value: "$inputs.userAddress"
          - name: x-chain-id
            in: header
            value: "$inputs.chainId"
        requestBody:
          contentType: application/json
          payload:
            message: "$inputs.message"
            threadId: "$inputs.threadId"
            userAddress: "$inputs.userAddress"
        successCriteria:
          - condition: $statusCode == 402
        outputs:
          paymentRequired: $response.header.PAYMENT-REQUIRED

      # ── Step 2 — Repeat the call with the Permit2 signature attached.
      # Server runs inference, streams SSE, settles the metered amount
      # (always <= the signed envelope), and writes a `receipt`
      # SSE event before the stream ends.
      - stepId: paid_stream
        operationId: $sourceDescriptions.manowar.agents_stream_create
        parameters:
          - name: walletAddress
            in: path
            value: "$inputs.agentWallet"
          - name: x-session-user-address
            in: header
            value: "$inputs.userAddress"
          - name: x-chain-id
            in: header
            value: "$inputs.chainId"
          - name: PAYMENT-SIGNATURE
            in: header
            value: "$inputs.paymentSignature"
        requestBody:
          contentType: application/json
          payload:
            message: "$inputs.message"
            threadId: "$inputs.threadId"
            userAddress: "$inputs.userAddress"
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          composeRunId: $response.header.x-run-id

      # ── Step 3 — Optional but recommended: leave structured feedback.
      # This is what trains the public reputation graph and lets your agent
      # be discoverable by future contacting agents.
      - stepId: feedback
        operationId: $sourceDescriptions.x402.feedback_submit
        parameters:
          - name: x-session-user-address
            in: header
            value: "$inputs.userAddress"
          - name: x-chain-id
            in: header
            value: "$inputs.chainId"
        requestBody:
          contentType: application/json
          payload:
            target:
              type: agent
              id: "$inputs.agentWallet"
            rating: 5
            category: integration
            message: "Worked first try."
            context:
              composeRunId: $steps.paid_stream.outputs.composeRunId
              chainId: "$inputs.chainId"
              agentWallet: "$inputs.agentWallet"
              endpoint:
                method: POST
                path: "/agent/{agentWallet}/stream"
        successCriteria:
          - condition: $statusCode == 201
